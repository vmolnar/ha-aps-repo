# Websupport DNS Integration Configuration
# This file defines the configuration schema for the Websupport DNS integration

# Main integration configuration
websupport_dns:
  # API credentials
  api_key: "your_api_key_here"
  api_secret: "your_api_secret_here"
  
  # Domain configuration
  domain: "example.com"
  subdomains: "home,www,api"
  
  # API configuration
  base_url: "rest.websupport.sk"
  
  # Update settings
  scan_interval: 10
  ttl: 3600

# Configuration options that can be set via UI:
# - api_key: Your Websupport API key
# - api_secret: Your Websupport API secret
# - domain: Your domain name (e.g., example.com)
# - subdomains: Comma-separated list of subdomains to update
# - base_url: Websupport API base URL (default: rest.websupport.sk)
# - scan_interval: Update interval in minutes (default: 10)
# - ttl: DNS TTL in seconds (default: 3600)

# For production use, store sensitive data in secrets.yaml:
# secrets.yaml:
#   websupport_api_key: "your_api_key_here"
#   websupport_api_secret: "your_api_secret_here"
#
# Then reference them in configuration.yaml:
# websupport_dns:
#   api_key: !secret websupport_api_key
#   api_secret: !secret websupport_api_secret
#   domain: "example.com"
#   subdomains: "home,www,api"