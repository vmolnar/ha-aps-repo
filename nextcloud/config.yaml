name: "Nextcloud"
description: "Simple Nextcloud setup using the official Docker image"
version: "1.0.0"
slug: "nextcloud"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  database_type: "sqlite"
  mysql_host: "db"
  mysql_database: "nextcloud"
  mysql_user: "nextcloud"
  mysql_password: ""
  nextcloud_admin_user: "admin"
  nextcloud_admin_password: ""
  trusted_domains: ""
schema:
  database_type: list(sqlite|mysql)
  mysql_host: str
  mysql_database: str
  mysql_user: str
  mysql_password: password
  nextcloud_admin_user: str
  nextcloud_admin_password: password
  trusted_domains: str