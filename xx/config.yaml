name: Websupport DNS mistral
description: Dynamic DNS (DDNS) service for Websupport.sk domains with automatic IP updates
version: 1.0.0
slug: websupport_dns_mistral

arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
init: false
startup: application
boot: auto
map:
  - ssl:rw
options:
  api_key: null
  api_secret: null
  domain: null
  subdomains:
    - null
  record_type: A
  ttl: 3600
  update_interval: 10
schema:
  api_key: str
  api_secret: str
  domain: str
  subdomains:
    - str
  record_type: list(A|AAAA)
  ttl: int
  update_interval: int

